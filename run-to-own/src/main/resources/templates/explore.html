<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Run-to-Own | Explore</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/explore.css">
</head>
<body>

<nav class="navbar">
    <a href="/home" class="nav-brand">Run-to-Own</a>
    <a href="/profile" class="nav-link">Profile</a>
</nav>

<div class="streak-widget">
    <span class="streak-icon">🔥</span>
    <div class="streak-text">
        <div class="streak-title">Current Streak</div>
        <div id="streak-counter" class="streak-value">0 Days</div>
        <div id="best-streak" class="streak-best">Best: 0 Days</div>
    </div>
</div>

<div class="map-container">
    <div id="map"></div>
    <div class="map-overlay">
        <button id="sync-runs-btn">Sync Latest Runs</button>
        <div id="loading-indicator" style="display: none;">Syncing...</div>
    </div>
</div>
<footer class="app-footer">
    <img src="/images/powered_by_strava.png" alt="Powered by Strava">
</footer>

<script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/h3-js@3.7.2"></script>
<script src="/js/explore.js"></script>

</body>
</html>
