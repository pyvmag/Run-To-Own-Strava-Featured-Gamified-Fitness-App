<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Run-to-Own | Home</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://unpkg.com/maplibre-gl@3.5.2/dist/maplibre-gl.css" rel="stylesheet" />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/home.css" />
</head>
<body>
<div id="loader">
    <div class="loader-content">
        <img src="/images/cycle_route.gif" class="loader-gif" alt="Loading animation" />
        <p>Loading your journey...</p>
    </div>
</div>

<nav class="navbar">
    <a href="/home" class="nav-brand">Run-to-Own</a>
    <div class="nav-links">
        <a href="/explore" class="nav-link">Explore</a>
        <a href="/profile" class="nav-link">Profile</a>

        <div class="dropdown">
            <button id="friends-dropdown-btn" class="nav-link icon-link">
                <span>Friends</span>
                <span id="friend-request-badge" class="badge" style="display: none;"></span>
            </button>
            <div id="friends-dropdown-menu" class="dropdown-menu">
                <div class="dropdown-header">Pending Requests</div>
                <div id="dropdown-request-list">
                    <div class="dropdown-item">Loading...</div>
                </div>
                <a href="/friends" class="dropdown-footer">Manage All Friends</a>
            </div>
        </div>
        <button id="theme-switch" aria-label="Toggle Theme">🌗</button>
    </div>
</nav>

<div class="streak-widget">
    <span class="streak-icon">🔥</span>
    <div class="streak-text">
        <div class="streak-title">Current Streak</div>
        <div id="streak-counter" class="streak-value">0 Days</div>
        <div id="best-streak" class="streak-best">Best: 0 Days</div>
    </div>
</div>

<main id="friends-runs">
    <h2>Recent Runs</h2>
    <div id="feed-container" class="feed"></div>
    <div id="loading-spinner" class="spinner" style="display:none;">Loading...</div>
    <button id="load-more-btn" class="load-more-btn">Load More</button>
    <div id="no-more-msg" class="no-more-msg" style="display:none;">No more runs to load.</div>
</main>

<footer class="app-footer">
    <img src="/images/powered_by_strava_1.png" alt="Powered by Strava" class="strava-logo light-logo">
    <img src="/images/powered_by_strava_2.png" alt="Powered by Strava" class="strava-logo dark-logo">
</footer>

<script src="https://unpkg.com/maplibre-gl@3.5.2/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/@mapbox/polyline"></script>
<script src="/js/main.js"></script> <script src="/js/home.js"></script>
</body>
</html>
